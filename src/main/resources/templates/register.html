<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="auth-page">
<div class="card auth-card shadow">
    <div class="card-body p-4">
        <h1 class="h3 mb-4 text-center">Регистрация</h1>
        <form th:action="@{/register}" th:object="${form}" method="post">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control"/>
                <div class="text-danger small" th:errors="*{email}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Имя</label>
                <input type="text" th:field="*{displayName}" class="form-control"/>
                <div class="text-danger small" th:errors="*{displayName}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Пароль</label>
                <input type="password" th:field="*{password}" class="form-control"/>
                <div class="text-danger small" th:errors="*{password}"></div>
            </div>
            <button type="submit" class="btn btn-success w-100">Зарегистрироваться</button>
        </form>
        <p class="text-center mt-3 mb-0"><a th:href="@{/login}">Уже есть аккаунт</a></p>
    </div>
</div>
</body>
</html>
