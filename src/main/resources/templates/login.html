<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
</head>
<body class="auth-page">
<div class="card auth-card shadow">
    <div class="card-body p-4">
        <h1 class="h3 mb-4 text-center">Вход</h1>
        <div th:if="${param.logout}" class="alert alert-info">Вы вышли из системы</div>
        <div th:if="${param.error}" class="alert alert-danger">Неверный email или пароль</div>
        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="username" class="form-control" required autofocus/>
            </div>
            <div class="mb-3">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" required/>
            </div>
            <button type="submit" class="btn btn-success w-100">Войти</button>
        </form>
        <p class="text-center mt-3 mb-0">
            <a th:href="@{/register}">Регистрация</a>
        </p>
        <p class="text-muted small text-center mt-2 mb-0">Демо: organizer@hike.local / demo</p>
    </div>
</div>
</body>
</html>
